<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>潮湿的雨夜 · 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; cursor: crosshair; }
    canvas { display: block; width: 100%; height: 100%; }
    #info {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.4); font-family: 'Noto Serif SC', serif;
      font-size: 12px; letter-spacing: 2px; pointer-events: none;
      text-align: center;
    }
    #title {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: rgba(100,160,255,0.15); font-family: 'Noto Serif SC', serif;
      font-size: clamp(40px, 8vw, 120px); letter-spacing: 0.3em;
      pointer-events: none; white-space: nowrap;
      text-shadow: 0 0 60px rgba(50,110,245,0.3);
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300&display=swap" rel="stylesheet">
</head>
<body>
  <div id="title">潮湿的雨夜</div>
  <div id="info">点击产生涟漪 · 滚轮缩放 · 拖拽旋转</div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.180.0/three.module.js",
        "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/2.0.0/spark.module.js"
      }
    }
  </script>
  <script type="module" src="sketch.js?v=1"></script>
</body>
</html>
